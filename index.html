let AC = null;
function initAC() { if (!AC) AC = new (AudioContext || webkitAudioContext)(); }
function tone(f, v, d, t='square', ef=null) {
  if (!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=t; const n=AC.currentTime;
  o.frequency.setValueAtTime(f,n);
  if(ef) o.frequency.exponentialRampToValueAtTime(ef,n+d);
  g.gain.setValueAtTime(0,n); g.gain.linearRampToValueAtTime(v,n+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,n+d);
  o.start(n); o.stop(n+d+0.02);
}
function noise(v, d) {
  if (!AC) return;
  const sz=Math.ceil(AC.sampleRate*d), buf=AC.createBuffer(1,sz,AC.sampleRate);
  const d2=buf.getChannelData(0); for(let i=0;i<sz;i++) d2[i]=Math.random()*2-1;
  const s=AC.createBufferSource(), g=AC.createGain();
  s.buffer=buf; s.connect(g); g.connect(AC.destination);
  const n=AC.currentTime;
  g.gain.setValueAtTime(v,n); g.gain.exponentialRampToValueAtTime(0.0001,n+d);
  s.start(n); s.stop(n+d);
}

// ══════════════════════════════════════════════════════
//  SEEDED RNG
// ══════════════════════════════════════════════════════
function makeRNG(seed) {
  let s = seed | 0;
  return () => { s=(Math.imul(1664525,s)+1013904223)|0; return (s>>>0)/0xFFFFFFFF; };
}

// ══════════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════════
let parts = [];
function part(cfg) {
  parts.push({ x:cfg.x, y:cfg.y,
    vx:cfg.vx??(Math.random()-.5)*(cfg.spd||80),
    vy:cfg.vy??(Math.random()-.5)*(cfg.spd||80),
    life:1, dec:cfg.dec||2.5, sz:cfg.sz||3,
    color:cfg.color||'#fff', grav:cfg.grav??300,
    type:cfg.type||'dot', text:cfg.text||'' });
}
function burst(x,y,col,n=8,spd=100,grav=300){
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2+Math.random()*.5, r=spd*(.5+Math.random()*.8);
    part({x,y,vx:Math.cos(a)*r,vy:Math.sin(a)*r,color:col,grav,sz:2+Math.random()*3,dec:2+Math.random()});
  }
}
function dustPuff(x,y){ for(let i=0;i<4;i++) part({x:x+(Math.random()-.5)*20,y,vx:(Math.random()-.5)*40,vy:-30-Math.random()*30,color:'#aaa',sz:4+Math.random()*4,dec:3,grav:0}); }
function scorePopup(x,y,txt,col='#ffd700'){ part({x,y,vy:-55,vx:0,color:col,type:'text',text:txt,dec:1.2,grav:-20}); }
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life-=p.dec*dt;
    if(p.life<=0){parts.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt;
  }
}
function drawParts(){
  for(const p of parts){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='text'){
      ctx.fillStyle=p.color; ctx.font='bold 14px monospace'; ctx.textAlign='center';
      ctx.fillText(p.text,p.x-cam.x,p.y-cam.y);
    } else {
      ctx.fillStyle=p.color;
      const s=p.sz*Math.max(0.2,p.life);
      ctx.fillRect(p.x-cam.x-s/2,p.y-cam.y-s/2,s,s);
    }
    ctx.restore();
  }
}

const GRAV=1600, MAX_FALL=900;
function overlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function moveCollide(e, plats, dt){
  e.wasOnGround=e.onGround; e.onGround=false;
  e.x+=e.vx*dt;
  for(const p of plats){ if(overlap(e,p)){
    const pL=(e.x+e.w)-p.x, pR=(p.x+p.w)-e.x;
    if(pL<pR){e.x-=pL;if(e.vx>0)e.vx=0;}else{e.x+=pR;if(e.vx<0)e.vx=0;}
  }}
  e.vy=Math.min(e.vy+GRAV*dt,MAX_FALL); e.y+=e.vy*dt;
  for(const p of plats){ if(overlap(e,p)){
    const pU=(e.y+e.h)-p.y, pD=(p.y+p.h)-e.y;
    if(pU<pD){e.y-=pU;if(e.vy>0){e.vy=0;e.onGround=true;}}
    else{e.y+=pD;if(e.vy<0)e.vy=0;}
  }}
}

const GROUND_Y = 460;
const ENEMY_CFG = {
  soldier:{ w:22,h:42,maxHealth:2,score:100,patrolSpeed:80,chaseSpeed:145,detect:200,color:'#3a5a10' },
  archer: { w:22,h:42,maxHealth:2,score:150,patrolSpeed:80,chaseSpeed:48, detect:200,color:'#4a6a20', isArcher:true },
  heavy:  { w:26,h:46,maxHealth:4,score:200,patrolSpeed:52,chaseSpeed:84, detect:220,color:'#57411d', shieldColor:'#7f632d' },
  bomber: { w:22,h:42,maxHealth:2,score:175,patrolSpeed:72,chaseSpeed:92, detect:260,color:'#6a4324' },
  glider: { w:24,h:34,maxHealth:1,score:125,patrolSpeed:118,chaseSpeed:160,detect:240,color:'#6b6bb0', flying:true },
};

function pickWeighted(rng, choices){
  const total=choices.reduce((sum,c)=>sum+c.weight,0);
  let roll=rng()*total;
  for(const choice of choices){
    roll-=choice.weight;
    if(roll<=0) return choice.type;
  }
  return choices[choices.length-1].type;
}

function chooseEnemyType(world, level, difficulty, plat, rng){
  const choices=[
    {type:'soldier', weight:plat.y<GROUND_Y ? 0.75 : 1.05},
    {type:'archer', weight:plat.y<GROUND_Y ? 1.0 : 0.45+difficulty*0.03},
  ];
  if(world===1&&level>=7&&plat.y<GROUND_Y&&plat.w>=120){
    choices.push({type:'glider', weight:plat.y<260 ? 0.35 : 0.18});
  }
  if(world===2&&level>=3&&plat.y>=340){
    choices.push({type:'heavy', weight:0.55});
  }
  if(world===2&&level>=5&&plat.w>=120&&plat.y>=260){
    choices.push({type:'bomber', weight:plat.y<GROUND_Y ? 0.45 : 0.28});
  }
  return pickWeighted(rng, choices);
}

function makeEnemySpawn(world, level, difficulty, plat, ex, rng){
  const type=chooseEnemyType(world, level, difficulty, plat, rng);
  if(type==='glider'){
    const homeY=Math.max(120, plat.y-130-Math.floor(rng()*24));
    return {type, x:ex, y:homeY, homeY, pL:Math.max(0,plat.x-20), pR:plat.x+plat.w+20};
  }
  return {type, x:ex, y:plat.y-ENEMY_CFG[type].h, pL:plat.x+5, pR:plat.x+plat.w-5};
}

function genLevel(world, level) {
  const isBoss = (level===5||level===10);
  const rng = makeRNG(world*100+level);
  if (isBoss) return genBossArena(world, level, rng);

  const worldW = 3800 + level*150;
  const plats = [];
  const enemies = [];
  const decorations = [];

  // Ground chunks
  let gx=0;
  while(gx < worldW-500){
    const gw=350+Math.floor(rng()*220);
    plats.push({x:gx,y:GROUND_Y,w:gw,h:20});
    gx += gw + 70 + Math.floor(rng()*70);
  }
  plats.push({x:worldW-420,y:GROUND_Y,w:420,h:20});

  // Floating platforms - 3 tiers
  const tiers=[
    {yMin:370,yMax:395,wMin:80,wMax:160,cnt:8+Math.floor(rng()*4)},
    {yMin:270,yMax:305,wMin:80,wMax:140,cnt:6+Math.floor(rng()*4)},
    {yMin:170,yMax:215,wMin:70,wMax:120,cnt:5+Math.floor(rng()*3)},
  ];
  for(const tier of tiers){
    let px=180+Math.floor(rng()*200);
    for(let i=0;i<tier.cnt;i++){
      const pw=tier.wMin+Math.floor(rng()*(tier.wMax-tier.wMin));
      const py=tier.yMin+Math.floor(rng()*(tier.yMax-tier.yMin));
      if(px+pw<worldW-500){ plats.push({x:px,y:py,w:pw,h:14}); }
      px+=pw+110+Math.floor(rng()*160);
    }
  }

  // Enemies on platforms
  const difficulty=level+(world-1)*10;
  for(const p of plats){
    if(p.w<100) continue;
    if(rng()<0.35) continue;
    const ex=p.x+40+Math.floor(rng()*(p.w-80));
    if(ex < 300) continue; // safe spawn zone near level start
    enemies.push(makeEnemySpawn(world, level, difficulty, p, ex, rng));
    // Extra enemy on long platforms in later levels
    if(p.w>200&&difficulty>5&&rng()<0.4){
      const ex2=p.x+p.w-80;
      enemies.push(makeEnemySpawn(world, level, difficulty, p, ex2, rng));
    }
  }

  // Background decorations
  for(let i=0;i<30;i++){
    decorations.push({type:pickDecorType(world,rng),x:Math.floor(rng()*worldW),scale:0.5+rng()*0.8,layer:rng()<0.5?0:1});
  }

  const checkX = Math.floor(worldW/2);
  const flagX = worldW - 80;

  return { worldW, plats, enemies, decorations, checkX, checkY:GROUND_Y-80, flagX, flagY:GROUND_Y-80,
    playerStart:{x:80,y:GROUND_Y-PHIL_H-1}, isBoss:false };
}

//  GAME STATE
// ══════════════════════════════════════════════════════
let G = { screen:'TITLE', world:1, level:1, score:0, highScore:+localStorage.getItem('pe_hs')||0, lives:3 };
let levelData = null, cam = {x:0,y:0}, frameN = 0, shake = 0;
let phil, enemies, projs, pickups, boss, checkActivated, checkpointRespawn;
let bossIntroTimer = 0, levelClearTimer = 0, deathTimer = 0;
let mechFinalTriggered = false;
let paused = false, pauseSelect = 0, pauseKeyHeld = false;
let combo = 0, comboTimer = 0;
const COMBO_WINDOW = 3.0, COMBO_MAX = 10;

const PHIL_W=22, PHIL_H=44, ATK_RANGE=60, ATK_DUR=0.22, ATK_CD=0.38, INV_DUR=1.1;

function initPhil(sx,sy){
  phil={ x:sx,y:sy, vx:0,vy:0, w:PHIL_W,h:PHIL_H,
    health:5.0, maxHealth:5.0, facingR:true,
    onGround:false, wasOnGround:false,
    walkCycle:0, jumpBuffer:0,
    attacking:false, atkTimer:0, atkCD:0, attackedSet:new Set(),
    shielding:false, dead:false, deathTimer:0, invTimer:2.0 };
}

function spawnEnemies(defs){
  return defs.map(d=>{
    const cfg=ENEMY_CFG[d.type]||ENEMY_CFG.soldier;
    return {
      type:d.type, x:d.x, y:d.y, vx:0,vy:0, w:cfg.w,h:cfg.h,
      health:cfg.maxHealth,maxHealth:cfg.maxHealth, facingR:false,
      onGround:false, wasOnGround:false, walkCycle:(d.x*0.07)%(Math.PI*2),
      pL:d.pL,pR:d.pR, homeY:d.homeY??d.y,
      aiState:'PATROL', alertTimer:0, atkCD:0,
      dead:false, deathTimer:0, alerted:false, stateTimer:0,
      guardOpen:false, hoverPhase:(d.x*0.031)%(Math.PI*2),
    };
  });
}

function startLevel(){
  levelData = genLevel(G.world, G.level);
  enemies   = spawnEnemies(levelData.enemies);
  projs     = [];
  pickups   = [];
  boss      = null;
  checkActivated = false;
  checkpointRespawn = null;
  parts     = [];
  cam.x=0; cam.y=0; shake=0; paused=false; combo=0; comboTimer=0;
  initPhil(levelData.playerStart.x, levelData.playerStart.y);

  if(levelData.isBoss){
    G.screen = 'BOSS_INTRO';
    bossIntroTimer = 3.0;
    const bt = getBossType(G.world, G.level);
    boss = spawnBoss(bt, levelData.worldW);
  } else {
    G.screen = 'PLAYING';
  }
}

function nextLevel(){
  G.level++;
  if(G.level>10){
    if(G.world<TOTAL_WORLDS){ G.world++; G.level=1; phil.health=5.0; G.lives=3; }
    else {
      startFinalBossLevel();
      return;
    }
  }
  startLevel();
}

function canUseWorldCheat(){
  return G.screen==='PLAYING' && !paused && phil && !phil.dead;
}
function handleWorldCheatInput(key){
  if(!canUseWorldCheat()){ resetWorldCheat(); return; }
  const now=performance.now();
  if(now-worldCheatLastAt>WORLD_CHEAT_TIMEOUT) resetWorldCheat();
  worldCheatLastAt=now;
  worldCheatBuffer=(worldCheatBuffer+key).slice(-WORLD_CHEAT.length);
  mobileWorldCheatBuffer=(mobileWorldCheatBuffer+key).slice(-MOBILE_WORLD_CHEAT.length);
  if(worldCheatBuffer===WORLD_CHEAT||mobileWorldCheatBuffer===MOBILE_WORLD_CHEAT){
    resetWorldCheat();
    useWorldCheat();
  }
}
function handleWorldCheatKey(e){
  if(e.repeat||e.ctrlKey||e.metaKey||e.altKey||e.key.length!==1) return;
  const key=e.key.toLowerCase();
  if(key<'a'||key>'z') return;
  handleWorldCheatInput(key);
}
function handleWorldCheatTouch(key){ handleWorldCheatInput(key); }
function restoreWorldCheatState(keep){
  G.score=keep.score;
  G.lives=keep.lives;
  phil.maxHealth=keep.maxHealth;
  phil.health=Math.min(keep.health,phil.maxHealth);
}
function startFinalBossLevel(){
  G.screen='FINAL_BOSS_INTRO'; bossIntroTimer=3.5;
  levelData = genBossArena(TOTAL_WORLDS,10,makeRNG(TOTAL_WORLDS*100+10));
  levelData.worldW=1600;
  levelData.plats=[{x:0,y:GROUND_Y,w:1600,h:20},{x:200,y:340,w:120,h:14},{x:740,y:300,w:120,h:14},{x:1280,y:340,w:120,h:14}];
  enemies=[];projs=[];pickups=[];parts=[];cam.x=0;cam.y=0;shake=0;
  initPhil(120,GROUND_Y-44);
  boss=spawnBoss('mech',1600);
}
function useWorldCheat(){
  const keep={ score:G.score, lives:G.lives, health:phil.health, maxHealth:phil.maxHealth };
  if(boss?.type==='mech'||G.level>10){
    SFX.pickup();
    scorePopup(phil.x+phil.w/2,phil.y-18,'FINAL BATTLE','#88ddff');
    return;
  }
  if(G.world<TOTAL_WORLDS){
    G.world++;
    G.level=1;
    startLevel();
    restoreWorldCheatState(keep);
    scorePopup(phil.x+phil.w/2,phil.y-18,`WORLD ${G.world}`,'#88ddff');
    SFX.checkpoint();
    return;
  }
  G.level++;
  if(G.level>10){
    startFinalBossLevel();
    restoreWorldCheatState(keep);
    scorePopup(phil.x+phil.w/2,phil.y-18,'FINAL BOSS','#88ddff');
  } else {
    startLevel();
    restoreWorldCheatState(keep);
    scorePopup(phil.x+phil.w/2,phil.y-18,`LEVEL ${G.level}`,'#88ddff');
  }
  SFX.checkpoint();
}

// ══════════════════════════════════════════════════════
//  PLAYER (PHIL)
// ══════════════════════════════════════════════════════
function updatePhil(dt){
  if(phil.dead){ phil.deathTimer-=dt; return; }

  const left=In.left(), right=In.right();
  const shielding = In.shield() && !phil.attacking;
  phil.shielding = shielding;
  const speed = shielding ? 100 : 240;

  if(left){  phil.vx=-speed; phil.facingR=false; }
  else if(right){ phil.vx=speed; phil.facingR=true; }
  else phil.vx *= Math.pow(0.02,dt);

  // Jump buffering
  if(In.jump()) phil.jumpBuffer=0.12;
  if(phil.jumpBuffer>0){
    phil.jumpBuffer-=dt;
    if(phil.onGround){ phil.vy=-620; phil.jumpBuffer=0; SFX.jump(); dustPuff(phil.x+phil.w/2,phil.y+phil.h); }
  }

  // Attack
  if(In.atk()&&phil.atkCD<=0&&!shielding){
    phil.attacking=true; phil.atkTimer=ATK_DUR; phil.atkCD=ATK_CD;
    phil.attackedSet.clear(); SFX.atk();
  }
  if(phil.atkTimer>0) phil.atkTimer-=dt; else phil.attacking=false;
  if(phil.atkCD>0) phil.atkCD-=dt;
  if(phil.invTimer>0) phil.invTimer-=dt;
  if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0) combo=0; }

  moveCollide(phil, levelData.plats, dt);
  if(phil.onGround&&!phil.wasOnGround){ dustPuff(phil.x+phil.w/2,phil.y+phil.h); SFX.land(); }
  if(phil.onGround&&Math.abs(phil.vx)>20) phil.walkCycle+=dt*8;

  // Attack hit check
  if(phil.attacking){
    const ax = phil.facingR ? phil.x+phil.w : phil.x-ATK_RANGE;
    const atkBox={x:ax,y:phil.y+8,w:ATK_RANGE,h:28};
    // Hit enemies
    for(const e of enemies){
      if(!e.dead&&!phil.attackedSet.has(e)&&overlap(atkBox,e)){
        phil.attackedSet.add(e);
        if(e.type==='glider'&&phil.onGround) continue;
        if(isHeavyFrontGuarding(e)){
          burst((phil.facingR?e.x:e.x+e.w),e.y+e.h*0.45,'#88ccff',6,70,0); SFX.block();
          continue;
        }
        hitEnemy(e,1);
      }
    }
    // Destroy bombs mid-air
    for(const p of projs){
      if(p.dead||p.type!=='bomb'||!overlap(atkBox,p)) continue;
      p.dead=true;
      burst(p.x,p.y,'#ffd27a',10,90,30); SFX.block();
    }
    // Hit boss
    if(boss&&!boss.dead&&!phil.attackedSet.has(boss)&&overlapBoss(atkBox)){
      phil.attackedSet.add(boss); hitBoss(1, atkBox);
    }
  }

  // World clamp
  if(phil.x<0){phil.x=0;phil.vx=0;}
  if(phil.x+phil.w>levelData.worldW){phil.x=levelData.worldW-phil.w;phil.vx=0;}
  if(phil.y>H+100){ philDie(); return; }

  // Projectile hits
  if(phil.invTimer<=0){
    for(const p of projs){
      if(p.dead||!p.hostile||p.type!=='arrow') continue;
      const pb={x:p.x,y:p.y,w:p.w,h:p.h};
      if(!overlap(pb,phil)) continue;
      // Shield block check (only arrows blockable)
      if(phil.shielding&&p.type==='arrow'){
        const fromRight=p.vx<0, facingRight=phil.facingR;
        if(fromRight===facingRight){ p.dead=true; burst(p.x,p.y,'#88ccff',6,70,0); SFX.block(); continue; }
      }
      p.dead=true; philTakeDmg(0.5); break;
    }
  }

  // Enemy contact
  if(phil.invTimer<=0){
    for(const e of enemies){
      if(e.dead) continue;
      if(!overlap(phil,e)) continue;
      // Shield block melee
      if(phil.shielding){
        const eInFront=phil.facingR?(e.x>phil.x):(e.x+e.w<phil.x+phil.w);
        if(eInFront){ SFX.block(); phil.invTimer=0.3; continue; }
      }
      philTakeDmg(0.5); phil.vx=phil.x<e.x+e.w/2?-220:220; phil.vy=-300; break;
    }
  }

  // Boss contact
  if(boss&&!boss.dead&&phil.invTimer<=0&&overlapBoss(phil)){
    const focus=getBossFocusBox()||boss;
    philTakeDmg(0.5); phil.vx=phil.x<focus.x+focus.w/2?-250:250; phil.vy=-320;
  }

  // Checkpoint
  if(!checkActivated&&levelData.checkX){
    const flagBox={x:levelData.checkX-15,y:levelData.checkY-80,w:30,h:90};
    if(overlap(phil,flagBox)){
      checkActivated=true; SFX.checkpoint();
      checkpointRespawn={x:levelData.checkX-PHIL_W/2, y:GROUND_Y-PHIL_H-1};
      burst(levelData.checkX,levelData.checkY-20,'#4488ff',10,60,0);
      scorePopup(levelData.checkX,levelData.checkY-50,'+100','#4488ff');
      G.score+=100;
    }
  }

  // Red flag (level end)
  if(levelData.flagX&&!boss){
    const flagBox={x:levelData.flagX-15,y:levelData.flagY-80,w:30,h:90};
    if(overlap(phil,flagBox)){ levelComplete(); }
  }
}

function philTakeDmg(amt){
  if(phil.invTimer>0) return;
  phil.health=Math.max(0,phil.health-amt);
  phil.invTimer=INV_DUR; shake=0.4;
  combo=0; comboTimer=0;
  burst(phil.x+phil.w/2,phil.y+phil.h/2,'#ff4444',10,120);
  SFX.hit();
  if(phil.health<=0) philDie();
}

function philDie(){
  phil.dead=true; phil.deathTimer=1.8;
  burst(phil.x+phil.w/2,phil.y+phil.h/2,'#4488ff',20,150,400);
  SFX.die(); shake=0.7;
  combo=0; comboTimer=0;
  G.lives--;
  if(G.lives>0){
    setTimeout(()=>{ respawnPhil(); },1800);
  } else {
    setTimeout(()=>{ G.screen='GAME_OVER'; },1800);
  }
}

function respawnPhil(){
  const sp=checkpointRespawn||levelData.playerStart;
  initPhil(sp.x,sp.y);
  G.screen='PLAYING';
}

function levelComplete(){
  G.score+=500; SFX.clear();
  G.lives=3; phil.health=5.0;
  burst(levelData.flagX,levelData.flagY-20,'#ff3322',16,120,0);
  G.screen='LEVEL_CLEAR'; levelClearTimer=2.5;
}

// ══════════════════════════════════════════════════════
//  ENEMIES
// ══════════════════════════════════════════════════════
const BOMB_RADIUS = 56;

function alertEnemy(e){
  e.aiState='CHASE'; e.alertTimer=4;
  if(!e.alerted){ e.alerted=true; SFX.roar(); scorePopup(e.x+e.w/2,e.y-20,'!','#ffee00'); }
}

function resetEnemy(e){
  e.aiState='PATROL'; e.alerted=false; e.stateTimer=0; e.guardOpen=false;
}

function patrolGroundEnemy(e, speed){
  e.vx=e.facingR?speed:-speed;
  if(e.x<=e.pL){ e.facingR=true; e.vx=Math.abs(e.vx); }
  if(e.x+e.w>=e.pR){ e.facingR=false; e.vx=-Math.abs(e.vx); }
}

function clampGroundEnemy(e){
  if(e.x<=e.pL){ e.x=e.pL; e.facingR=true; }
  if(e.x+e.w>=e.pR){ e.x=e.pR-e.w; e.facingR=false; }
}

function hoverFlyingEnemy(e, targetY){
  e.vy=(targetY-e.y)*5;
}

function isHeavyFrontGuarding(e){
  if(e.type!=='heavy'||e.guardOpen||e.dead) return false;
  const philMid=phil.x+phil.w/2, enemyMid=e.x+e.w/2;
  return e.facingR ? philMid>=enemyMid : philMid<=enemyMid;
}

function updateSoldierAI(e, dx, dist, dt){
  const cfg=ENEMY_CFG[e.type];
  if(phil.dead){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  if(e.aiState==='PATROL'){
    if(dist<cfg.detect) alertEnemy(e);
    if(e.aiState==='PATROL'){ patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  }
  e.alertTimer-=dt;
  if(dist>cfg.detect*1.8&&e.alertTimer<=0){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  e.facingR=dx>0;
  e.vx=e.facingR?cfg.chaseSpeed:-cfg.chaseSpeed;
}

function updateArcherAI(e, dx, dy, dist, dt){
  const cfg=ENEMY_CFG.archer;
  if(phil.dead){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  if(e.aiState==='PATROL'){
    if(dist<cfg.detect) alertEnemy(e);
    if(e.aiState==='PATROL'){ patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  }
  e.alertTimer-=dt;
  if(dist>cfg.detect*1.8&&e.alertTimer<=0){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  e.facingR=dx>0;
  if(e.aiState==='ATTACK'){
    e.vx=0;
    if(e.stateTimer<=0){ shootArrow(e); e.aiState='CHASE'; }
    return;
  }
  e.vx=dist>140?(e.facingR?cfg.chaseSpeed:-cfg.chaseSpeed):0;
  if(e.atkCD<=0&&dist<350&&Math.abs(dy)<160){
    e.aiState='ATTACK'; e.stateTimer=0.55; e.atkCD=1.9; e.vx=0;
  }
}

function updateHeavyAI(e, dx, dist, dt){
  const cfg=ENEMY_CFG.heavy;
  e.guardOpen=false;
  if(phil.dead){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  if(e.aiState==='PATROL'){
    if(dist<cfg.detect) alertEnemy(e);
    if(e.aiState==='PATROL'){ patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  }
  e.alertTimer-=dt;
  if(e.aiState==='ATTACK'){
    e.guardOpen=true;
    e.facingR=dx>0;
    if(e.stateTimer>0.45) e.vx=0;
    else if(e.stateTimer>0.15) e.vx=e.facingR?cfg.chaseSpeed*1.25:-cfg.chaseSpeed*1.25;
    else e.vx*=Math.pow(0.02,dt);
    if(e.stateTimer<=0){ e.aiState='CHASE'; e.guardOpen=false; }
    return;
  }
  if(dist>cfg.detect*1.9&&e.alertTimer<=0){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  e.facingR=dx>0;
  if(dist>48) e.vx=e.facingR?cfg.chaseSpeed:-cfg.chaseSpeed;
  else if(e.atkCD<=0){
    e.aiState='ATTACK'; e.stateTimer=0.8; e.atkCD=1.6; e.vx=0; e.guardOpen=true;
  } else e.vx=0;
}

function updateBomberAI(e, dx, dy, dist, dt){
  const cfg=ENEMY_CFG.bomber;
  if(phil.dead){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  if(e.aiState==='PATROL'){
    if(dist<cfg.detect) alertEnemy(e);
    if(e.aiState==='PATROL'){ patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  }
  e.alertTimer-=dt;
  if(e.aiState==='ATTACK'){
    e.facingR=dx>0;
    e.vx=0;
    if(e.stateTimer<=0){ throwBomb(e); e.aiState='CHASE'; }
    return;
  }
  if(dist>cfg.detect*1.9&&e.alertTimer<=0){ resetEnemy(e); patrolGroundEnemy(e,cfg.patrolSpeed); return; }
  e.facingR=dx>0;
  if(dist<110) e.vx=e.facingR?-(cfg.chaseSpeed*1.35):(cfg.chaseSpeed*1.35);
  else if(dist>235) e.vx=e.facingR?cfg.chaseSpeed:-cfg.chaseSpeed;
  else e.vx=0;
  if(e.atkCD<=0&&dist>125&&dist<320&&Math.abs(dy)<150){
    e.aiState='ATTACK'; e.stateTimer=0.6; e.atkCD=2.6; e.vx=0;
  }
}

function updateGliderAI(e, dx, dy, dist, dt){
  const cfg=ENEMY_CFG.glider;
  const hoverY=e.homeY+Math.sin(frameN*0.08+e.hoverPhase)*6;
  if(phil.dead){
    resetEnemy(e);
    e.vx=e.facingR?cfg.patrolSpeed:-cfg.patrolSpeed;
    hoverFlyingEnemy(e,hoverY);
    return;
  }
  if(e.aiState==='PATROL'){
    if(dist<cfg.detect) alertEnemy(e);
    if(e.aiState==='PATROL'){
      e.vx=e.facingR?cfg.patrolSpeed:-cfg.patrolSpeed;
      hoverFlyingEnemy(e,hoverY);
      return;
    }
  }
  e.alertTimer-=dt;
  if(e.aiState==='ATTACK'){
    e.vy+=260*dt;
    if(e.stateTimer<=0||e.y>e.homeY+125||Math.abs(dx)>320) e.aiState='CHASE';
    return;
  }
  if(dist>cfg.detect*1.8&&e.alertTimer<=0){
    resetEnemy(e);
    e.vx=e.facingR?cfg.patrolSpeed:-cfg.patrolSpeed;
    hoverFlyingEnemy(e,hoverY);
    return;
  }
  e.facingR=dx>0;
  hoverFlyingEnemy(e,e.homeY+Math.sin(frameN*0.12+e.hoverPhase)*4);
  e.vx=e.facingR?cfg.chaseSpeed:-cfg.chaseSpeed;
  if(e.atkCD<=0&&dist<155&&Math.abs(dy)<135){
    const len=Math.hypot(dx,dy)||1;
    e.aiState='ATTACK'; e.stateTimer=0.75; e.atkCD=1.9;
    e.vx=dx/len*260; e.vy=dy/len*260;
  }
}

function updateEnemies(dt){
  for(const e of enemies){
    if(e.dead){ if(e.deathTimer>0)e.deathTimer-=dt; continue; }
    e.atkCD=Math.max(0,e.atkCD-dt);
    e.stateTimer=Math.max(0,e.stateTimer-dt);

    const dx=(phil.x+phil.w/2)-(e.x+e.w/2);
    const dy=(phil.y+phil.h/2)-(e.y+e.h/2);
    const dist=Math.hypot(dx,dy);

    switch(e.type){
      case 'archer': updateArcherAI(e,dx,dy,dist,dt); break;
      case 'heavy':  updateHeavyAI(e,dx,dist,dt); break;
      case 'bomber': updateBomberAI(e,dx,dy,dist,dt); break;
      case 'glider': updateGliderAI(e,dx,dy,dist,dt); break;
      default:       updateSoldierAI(e,dx,dist,dt); break;
    }

    if(e.type==='glider'){
      e.x+=e.vx*dt; e.y+=e.vy*dt;
      if(e.x<=e.pL){ e.x=e.pL; if(e.aiState==='PATROL') e.facingR=true; }
      if(e.x+e.w>=e.pR){ e.x=e.pR-e.w; if(e.aiState==='PATROL') e.facingR=false; }
      const minY=Math.max(90,e.homeY-24);
      const maxY=Math.min(GROUND_Y-80,e.homeY+140);
      e.y=Math.max(minY,Math.min(e.y,maxY));
      e.walkCycle+=dt*12;
      continue;
    }

    if(Math.abs(e.vx)>10) e.walkCycle+=dt*(e.type==='heavy'?5:7);
    moveCollide(e,levelData.plats,dt);
    clampGroundEnemy(e);
  }
}

function spawnHealthPickup(e){
  pickups.push({type:'health',x:e.x+e.w/2-8,y:e.y+e.h-18,w:16,h:16,heal:1,bob:(e.x*0.05)%(Math.PI*2),dead:false});
}

function updatePickups(dt){
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    if(p.dead){ pickups.splice(i,1); continue; }
    p.bob+=dt*4;
    if(!phil.dead&&phil.health<phil.maxHealth&&overlap(phil,p)){
      phil.health=Math.min(phil.maxHealth,phil.health+p.heal);
      p.dead=true;
      burst(p.x+p.w/2,p.y+p.h/2,'#ff6688',10,80,0);
      scorePopup(p.x+p.w/2,p.y-8,'+1 HP','#ff6688');
      SFX.pickup();
    }
  }
}

function hitEnemy(e, dmg){
  e.health-=dmg;
  burst(e.x+e.w/2,e.y+e.h/2,'#ff8844',8,110,200); SFX.hit();
  if(e.health<=0){
    e.dead=true; e.deathTimer=1.2;
    combo=Math.min(combo+1,COMBO_MAX); comboTimer=COMBO_WINDOW;
    const base=(ENEMY_CFG[e.type]||ENEMY_CFG.soldier).score;
    const pts=base*combo;
    G.score+=pts;
    const popCol=combo>=5?'#ff88ff':combo>=3?'#ffaa00':'#ffd700';
    const popTxt=combo>1?'+'+pts+' ×'+combo:'+'+pts;
    scorePopup(e.x+e.w/2,e.y-20,popTxt,popCol);
    if(combo>=3){ burst(e.x+e.w/2,e.y+e.h/2,combo>=5?'#ff88ff':'#ffaa00',16,150,300); SFX.coin(); }
    burst(e.x+e.w/2,e.y+e.h/2,'#ff4422',14,130,350); SFX.die();
    if(e.type==='heavy'&&Math.random()<0.5) spawnHealthPickup(e);
  }
}

function shootArrow(e){
  const dx=(phil.x+phil.w/2)-(e.x+e.w/2), dy=(phil.y+phil.h/2)-(e.y+e.h/2);
  const len=Math.hypot(dx,dy)||1, spd=300;
  projs.push({type:'arrow',hostile:true,x:e.x+(e.facingR?e.w:0),y:e.y+18,
    vx:dx/len*spd,vy:dy/len*spd-40,w:18,h:5,dead:false,grav:350});
}

function throwBomb(e){
  const sx=e.x+(e.facingR?e.w:0), sy=e.y+16;
  const tx=phil.x+phil.w/2, ty=phil.y+phil.h/2;
  const dx=tx-sx, dy=ty-sy;
  const grav=650;
  const t=Math.min(1.05,Math.max(0.55,Math.abs(dx)/220));
  const vx=Math.max(-260,Math.min(260,dx/t));
  const vy=Math.max(-560,Math.min(-220,(dy-0.5*grav*t*t)/t));
  projs.push({type:'bomb',hostile:true,x:sx,y:sy,vx,vy,w:12,h:12,dead:false,grav,radius:BOMB_RADIUS,rot:0});
}

function explodeBomb(p){
  if(p.dead) return;
  p.dead=true; shake=Math.max(shake,0.55); SFX.bomb();
  burst(p.x,p.y,'#ff8844',18,180,140);
  burst(p.x,p.y,'#ffaa66',10,90,0);
  if(phil.dead||phil.invTimer>0) return;
  const dx=(phil.x+phil.w/2)-p.x, dy=(phil.y+phil.h/2)-p.y;
  if(Math.hypot(dx,dy)<=p.radius){
    philTakeDmg(1.0);
    phil.vx=dx<0?-260:260; phil.vy=-280;
  }
}

// ══════════════════════════════════════════════════════
//  PROJECTILES
// ══════════════════════════════════════════════════════
function updateProjs(dt){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    if(p.dead){projs.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.grav)p.vy+=p.grav*dt;
    if(p.type==='bomb') p.rot+=(p.vx>=0?1:-1)*dt*8;
    if(p.y>H+80||p.x<-80||p.x>levelData.worldW+80){projs.splice(i,1);continue;}
    if(p.type==='bomb'){
      if(!phil.dead&&overlap(p,phil)){ explodeBomb(p); }
      if(!p.dead){
        for(const pl of levelData.plats){ if(overlap(p,pl)){ explodeBomb(p); break; } }
      }
      if(p.dead){ projs.splice(i,1); }
      continue;
    }
    for(const pl of levelData.plats){ if(overlap(p,pl)){p.dead=true;break;} }
  }
}

function getBossBodies(){
  if(!boss||boss.dead) return [];
  if(boss.type==='revenant'&&boss.twins?.length) return boss.twins.filter(t=>!t.dead);
  if(boss.hidden) return [];
  return [boss];
}

function getBossFocusBox(){
  if(!boss) return null;
  const bodies=getBossBodies();
  if(!bodies.length) return {x:boss.x,y:boss.y,w:boss.w,h:boss.h};
  const minX=Math.min(...bodies.map(b=>b.x));
  const minY=Math.min(...bodies.map(b=>b.y));
  const maxX=Math.max(...bodies.map(b=>b.x+b.w));
  const maxY=Math.max(...bodies.map(b=>b.y+b.h));
  return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}

function getBossHitTarget(box){
  const bodies=getBossBodies();
  return bodies.find(b=>overlap(box,b)) || null;
}

function overlapBoss(box){
  return !!getBossHitTarget(box);
}

function hitBoss(dmg, hitBox=null){
  if(!boss||boss.invTimer>0||boss.hidden) return;
  const target=getBossHitTarget(hitBox||{x:boss.x,y:boss.y,w:boss.w,h:boss.h}) || boss;
  boss.health-=dmg; boss.invTimer=0.1; shake=0.4; SFX.bossHit();
  burst(target.x+target.w/2,target.y+target.h/2,'#ffaa44',8,100,200);
  if(boss.health<=0&&!boss.dead){ bossKilled(); return; }
  // Phase 2
  if(boss.health<=boss.maxHealth/2&&boss.phase===1){
    boss.phase=2; shake=0.8;
    const focus=getBossFocusBox()||boss;
    burst(focus.x+focus.w/2,focus.y+focus.h/2,'#ff0000',20,180,300);
    if(boss.type==='revenant'&&!boss.twins){
      boss.hidden=true;
      boss.twins=[
        { x:220,y:GROUND_Y-76,w:52,h:76,vx:0,vy:0,state:'IDLE',timer:0.8,facingR:true,variant:'bone',dead:false,walkCycle:0,pL:80,pR:levelData.worldW/2-40,actionDone:false },
        { x:levelData.worldW-272,y:GROUND_Y-76,w:52,h:76,vx:0,vy:0,state:'IDLE',timer:0.8,facingR:false,variant:'brain',dead:false,walkCycle:0,pL:levelData.worldW/2+40,pR:levelData.worldW-80,actionDone:false },
      ];
    }
  }
}

function bossKilled(){
  boss.dead=true; boss.deathTimer=3.0; SFX.win(); shake=1.2;
  const focus=getBossFocusBox()||boss;
  for(let i=0;i<5;i++) setTimeout(()=>{
    burst(focus.x+Math.random()*focus.w,focus.y+Math.random()*focus.h,'#ffaa00',16,160,300);
    SFX.stomp();
  },i*400);
  const pts = getBossMeta(boss.type).points;
  G.score+=pts;
  if(boss.type==='mech'){
    setTimeout(()=>{ G.screen='WIN'; if(G.score>G.highScore){G.highScore=G.score;localStorage.setItem('pe_hs',G.highScore);} },3200);
  } else {
    setTimeout(()=>{ levelComplete(); },3200);
  }
}

// ── GIANT BOSS UPDATE ──
function updateGiant(dt){
  const b=boss, px=phil.x+phil.w/2, py=phil.y+phil.h/2;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;

  // Shockwaves
  for(let i=b.shockwaves.length-1;i>=0;i--){
    const sw=b.shockwaves[i];
    sw.x+=sw.vx*dt; sw.life-=dt;
    if(sw.life<=0){b.shockwaves.splice(i,1);continue;}
    if(phil.onGround&&phil.invTimer<=0&&overlap(phil,sw)){ philTakeDmg(0.5); }
  }

  switch(b.aiState){
    case 'INTRO':
      b.vx=-100; b.facingR=false;
      moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='IDLE'; b.stTimer=1.0; SFX.roar(); }
      break;
    case 'IDLE':
      b.vx*=Math.pow(0.05,dt);
      moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){
        const dx=px-(b.x+b.w/2);
        b.aiState=Math.abs(dx)>250?'CHARGE':'STOMP';
        b.stTimer=b.aiState==='CHARGE'?2.2:1.8;
        if(b.aiState==='CHARGE'){ b.facingR=dx>0; b.chargeDir=dx>0?1:-1; SFX.stomp(); }
        else SFX.stomp();
      }
      break;
    case 'CHARGE':
      b.vx=b.chargeDir*(b.phase===2?480:380);
      b.facingR=b.chargeDir>0;
      moveCollide(b,levelData.plats,dt);
      if(b.x<=0||(b.x+b.w>=levelData.worldW)||b.stTimer<=0){ b.aiState='IDLE'; b.stTimer=1.0+(b.phase===1?0.5:0); }
      break;
    case 'STOMP':
      b.vx*=Math.pow(0.05,dt);
      moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=1.0&&b.stTimer>0.9){ // slam moment
        SFX.stomp(); shake=0.7;
        const n=b.phase===2?3:2;
        const dirs=[-1,1]; if(n===3)dirs.push(0);
        for(const d of dirs){
          if(d===0) b.shockwaves.push({x:b.x+b.w/2-40,y:GROUND_Y-18,vx:0,w:80,h:18,life:0.2});
          else b.shockwaves.push({x:b.x+b.w/2+(d<0?-40:b.w/2),y:GROUND_Y-18,vx:d*220,w:80,h:18,life:1.5});
        }
        b.stTimer=0.85;
      }
      if(b.stTimer<=0){ b.aiState='IDLE'; b.stTimer=1.2; }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*5;
  b.x=Math.max(0,Math.min(b.x,levelData.worldW-b.w));
  b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
}

// ── ANACONDA BOSS UPDATE ──
function updateAnaconda(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;

  // Update segment history
  b.segHistory.unshift({x:b.x+15,y:b.y+15});
  if(b.segHistory.length>120) b.segHistory.pop();

  // Shockwaves (venom projectiles)
  for(let i=b.shockwaves.length-1;i>=0;i--){
    const sw=b.shockwaves[i];
    sw.x+=sw.vx*dt; sw.y+=sw.vy*dt; sw.vy+=400*dt; sw.life-=dt;
    if(sw.life<=0){b.shockwaves.splice(i,1);continue;}
    const vb={x:sw.x-8,y:sw.y-8,w:16,h:16};
    if(phil.invTimer<=0&&overlap(phil,vb)){ philTakeDmg(0.5); sw.life=0; }
    for(const pl of levelData.plats){ if(overlap(vb,pl)){sw.life=0;break;} }
  }

  // Body segment damage
  if(phil.invTimer<=0){
    for(let i=1;i<b.segCount;i++){
      const idx=Math.min(i*10,b.segHistory.length-1);
      if(idx<0)continue;
      const seg=b.segHistory[idx];
      const segR=14-(i/b.segCount)*4;
      if(Math.hypot(phil.x+phil.w/2-seg.x,phil.y+phil.h/2-seg.y)<segR+12){
        philTakeDmg(0.5); break;
      }
    }
  }

  switch(b.aiState){
    case 'SLITHER':
      b.sinPhase+=dt*(b.phase===2?1.8:1.3);
      b.vx=(b.movingR?1:-1)*(b.phase===2?180:140);
      b.vy=Math.sin(b.sinPhase)*(b.phase===2?200:150);
      b.x+=b.vx*dt; b.y=Math.max(GROUND_Y-100,Math.min(b.y+b.vy*dt,GROUND_Y-30));
      if(b.movingR&&b.x>levelData.worldW-200) b.movingR=false;
      if(!b.movingR&&b.x<150) b.movingR=true;
      b.facingR=b.movingR;
      // Spit venom
      if(b.stTimer<=0){
        const r=Math.random();
        if(r<0.45){ b.aiState='SPIT'; b.stTimer=1.0; }
        else{ b.aiState='RISE'; b.stTimer=1.2; }
      }
      break;
    case 'SPIT':
      b.x+=b.vx*dt*0.3;
      if(b.stTimer<=0){
        // Shoot venom arc at player
        const dx=(phil.x+phil.w/2)-(b.x+15), dy=(phil.y+phil.h/2)-(b.y+15);
        const len=Math.hypot(dx,dy)||1, spd=240;
        const n=b.phase===2?3:1;
        for(let i=0;i<n;i++){
          const spread=(i-Math.floor(n/2))*0.25;
          b.shockwaves.push({x:b.x+15,y:b.y+15,vx:dx/len*spd+spread*spd,vy:dy/len*spd-60,life:3});
        }
        burst(b.x+15,b.y+15,'#44ff44',8,80,0); SFX.roar();
        b.aiState='SLITHER'; b.stTimer=2.5+(Math.random()*1.5);
      }
      break;
    case 'RISE':
      b.y-=200*dt;
      if(b.stTimer<=0){ b.aiState='STRIKE'; b.stTimer=0.5; b.strikeTargetX=phil.x+phil.w/2; }
      break;
    case 'STRIKE':
      b.x+=(b.strikeTargetX-15-b.x)*Math.min(1,6*dt);
      b.y+=380*dt;
      if(b.stTimer<=0||b.y>=GROUND_Y-30){ b.y=GROUND_Y-30; b.aiState='SLITHER'; b.stTimer=3.0+Math.random()*1.5; SFX.stomp(); shake=0.5; }
      break;
  }
  b.x=Math.max(50,Math.min(b.x,levelData.worldW-80));
}

// ── LIZARD BOSS UPDATE ──
function updateLizard(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;

  // Shockwaves
  for(let i=b.shockwaves.length-1;i>=0;i--){
    const sw=b.shockwaves[i];
    sw.x+=sw.vx*dt; sw.life-=dt;
    if(sw.life<=0){b.shockwaves.splice(i,1);continue;}
    if(phil.onGround&&phil.invTimer<=0&&overlap(phil,sw)){ philTakeDmg(0.5); }
  }

  // Laser damage
  if(b.laserActive&&phil.invTimer<=0){
    // compute laser beam vs player
    const bx=b.facingR?b.x+b.w:b.x;
    const by=b.y+30;
    const lx2=bx+Math.cos(b.laserAngle)*600;
    const ly2=by+Math.sin(b.laserAngle)*600;
    // Simple AABB vs line: check player center distance to line
    const pcx=phil.x+phil.w/2, pcy=phil.y+phil.h/2;
    const ldx=lx2-bx, ldy=ly2-by, llen=Math.hypot(ldx,ldy)||1;
    const t=((pcx-bx)*ldx+(pcy-by)*ldy)/(llen*llen);
    const perpX=pcx-(bx+t*ldx), perpY=pcy-(by+t*ldy);
    if(t>0&&t<1&&Math.hypot(perpX,perpY)<20){ philTakeDmg(0.5); b.laserDmgTimer=0.4; }
    b.laserAngle+=Math.sign((phil.y+phil.h/2)-by-Math.sin(b.laserAngle)*100)*0.8*dt;
  }

  switch(b.aiState){
    case 'INTRO':
      b.vx=-80; moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.5+Math.random(); SFX.roar(); }
      break;
    case 'WALK':
      b.vx=b.facingR?(b.phase===2?150:110):-(b.phase===2?150:110);
      moveCollide(b,levelData.plats,dt);
      if(b.x<=0){b.facingR=true;} if(b.x+b.w>=levelData.worldW){b.facingR=false;}
      if(b.stTimer<=0){
        const r=Math.random();
        if(r<0.35){ b.aiState='LASER_CHARGE'; b.stTimer=1.2; b.laserAngle=b.facingR?-0.1:Math.PI+0.1; }
        else if(r<0.65){ b.aiState='STOMP'; b.stTimer=1.0; }
        else{ b.aiState='TAIL'; b.stTimer=1.0; b.tailAngle=0; }
      }
      break;
    case 'LASER_CHARGE':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
      if(b.stTimer<=0){ b.aiState='LASER_FIRE'; b.stTimer=2.0+(b.phase===2?0.5:0); b.laserActive=true; SFX.laser(); }
      break;
    case 'LASER_FIRE':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.laserActive=false; b.aiState='WALK'; b.stTimer=1.5+Math.random(); }
      break;
    case 'STOMP':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0.4&&b.stTimer>0.3){ SFX.stomp(); shake=0.6; b.shockwaves.push({x:b.x-50,y:GROUND_Y-18,vx:-180,w:80,h:18,life:1.4}); b.shockwaves.push({x:b.x+b.w+50,y:GROUND_Y-18,vx:180,w:80,h:18,life:1.4}); }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.5+Math.random(); }
      break;
    case 'TAIL':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      b.tailAngle+=dt*3.5;
      // Tail hitbox sweeps behind lizard
      const tailDir=b.facingR?-1:1;
      const tx=b.x+(b.facingR?0:b.w)+tailDir*80;
      const ty=GROUND_Y-30;
      const tailBox={x:tx-30,y:ty-30,w:60,h:30};
      if(phil.invTimer<=0&&overlap(phil,tailBox)){ philTakeDmg(0.5); }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.5+Math.random(); }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*4;
  b.x=Math.max(0,Math.min(b.x,levelData.worldW-b.w));
  if(b.aiState==='WALK') b.facingR=b.vx>0;
}

// ── MECH BOSS UPDATE ──
function updateMech(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;

  // Fists
  for(let i=b.fists.length-1;i>=0;i--){
    const f=b.fists[i];
    f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=600*dt; f.life-=dt;
    if(f.life<=0){b.fists.splice(i,1);continue;}
    if(f.y>GROUND_Y-10){
      SFX.stomp(); shake=0.5;
      b.shockwaves.push({x:f.x-40,y:GROUND_Y-18,vx:-200,w:80,h:18,life:1.2});
      b.shockwaves.push({x:f.x+40,y:GROUND_Y-18,vx:200,w:80,h:18,life:1.2});
      burst(f.x,GROUND_Y-20,'#ff8800',14,150,300);
      b.fists.splice(i,1); continue;
    }
    const fb={x:f.x-15,y:f.y-15,w:30,h:30};
    if(phil.invTimer<=0&&overlap(phil,fb)){ philTakeDmg(0.5); f.life=0; }
  }

  // Shockwaves
  for(let i=b.shockwaves.length-1;i>=0;i--){
    const sw=b.shockwaves[i];
    sw.x+=sw.vx*dt; sw.life-=dt;
    if(sw.life<=0){b.shockwaves.splice(i,1);continue;}
    if(phil.onGround&&phil.invTimer<=0&&overlap(phil,sw)){ philTakeDmg(0.5); }
  }

  // Laser eyes
  if(b.laserActive){
    if(b.laserTimer>0){ b.laserTimer-=dt; SFX.laser(); }
    else { b.laserActive=false; }
    // Laser hits player
    if(phil.invTimer<=0){
      const eyeX=b.x+b.w/2, eyeY=b.y+35;
      const targetX=phil.x+phil.w/2, targetY=phil.y+phil.h/2;
      const ang=Math.atan2(targetY-eyeY,targetX-eyeX);
      b.laserAngle+=(ang-b.laserAngle)*Math.min(1,2*dt);
      // Check player on line
      const dist=Math.hypot(targetX-eyeX,targetY-eyeY);
      if(dist<400){ const perp=Math.abs((targetY-eyeY)*Math.cos(b.laserAngle)-(targetX-eyeX)*Math.sin(b.laserAngle)); if(perp<16){ philTakeDmg(0.5); } }
    }
  }

  switch(b.aiState){
    case 'INTRO':
      b.vx=-60; moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='IDLE'; b.stTimer=1.2; SFX.roar(); SFX.roar(); shake=0.6; }
      break;
    case 'IDLE':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){
        b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
        const r=Math.random();
        const spd=b.phase===2?0.7:1.0; // phase 2 = faster (shorter timers)
        if(r<0.3){ b.aiState='FIST'; b.stTimer=0.8*spd; }
        else if(r<0.6){ b.aiState='LASER'; b.stTimer=0.9*spd; }
        else{ b.aiState='STOMP'; b.stTimer=0.8*spd; }
      }
      break;
    case 'FIST':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){
        const n=b.phase===2?2:1;
        for(let i=0;i<n;i++){
          const offsetX=b.facingR?(b.w-20+i*30):(-i*30);
          const targetX=phil.x+phil.w/2+i*60;
          const dx=targetX-(b.x+offsetX), dy=GROUND_Y-(b.y+60);
          const t=0.7; const g2=600;
          b.fists.push({x:b.x+offsetX,y:b.y+60,vx:dx/t,vy:dy/t-0.5*g2*t,life:2.0});
        }
        SFX.roar(); b.aiState='IDLE'; b.stTimer=b.phase===2?1.0:1.5;
      }
      break;
    case 'LASER':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){
        b.laserActive=true; b.laserAngle=b.facingR?0:Math.PI;
        b.laserTimer=b.phase===2?2.2:1.6; SFX.laser();
        b.aiState='IDLE'; b.stTimer=b.laserTimer+0.5;
      }
      break;
    case 'STOMP':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0.3&&b.stTimer>0.2){ SFX.stomp(); shake=0.8; b.shockwaves.push({x:b.x-60,y:GROUND_Y-18,vx:-260,w:100,h:18,life:1.6}); b.shockwaves.push({x:b.x+b.w+60,y:GROUND_Y-18,vx:260,w:100,h:18,life:1.6}); burst(b.x+b.w/2,GROUND_Y-20,'#ff8800',16,160,0); }
      if(b.stTimer<=0){ b.aiState='IDLE'; b.stTimer=b.phase===2?1.0:1.5; }
      break;
  }
  b.x=Math.max(0,Math.min(b.x,levelData.worldW-b.w));
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*3;
  b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
}

function pushGroundWave(list, x, vx, w=80, life=1.4, color='rgba(255,180,50,0.35)'){
  list.push({x,y:GROUND_Y-18,vx,w,h:18,life,color});
}

function updateGroundWaves(list, dt, requireGround=true){
  for(let i=list.length-1;i>=0;i--){
    const sw=list[i];
    sw.x+=sw.vx*dt; sw.life-=dt;
    if(sw.life<=0){ list.splice(i,1); continue; }
    if(phil.invTimer<=0&&(!requireGround||phil.onGround)&&overlap(phil,sw)) philTakeDmg(0.5);
  }
}

function getShotBox(s){
  if(s.w!=null&&s.h!=null) return {x:s.x-s.w/2,y:s.y-s.h/2,w:s.w,h:s.h};
  const r=s.r||8;
  return {x:s.x-r,y:s.y-r,w:r*2,h:r*2};
}

function shotHitsPlatforms(s){
  const box=getShotBox(s);
  for(const pl of levelData.plats){ if(overlap(box,pl)) return true; }
  return false;
}

function shotHitsPhil(s, dmg=0.5){
  if(phil.invTimer<=0&&overlap(phil,getShotBox(s))){ philTakeDmg(dmg); return true; }
  return false;
}

      b.vx=b.facingR?(b.phase===2?155:118):-(b.phase===2?155:118);

      if(b.x<=0) b.facingR=true;
      if(b.x+b.w>=levelData.worldW) b.facingR=false;
      if(b.stTimer<=0){
        const roll=Math.random();
        b.actionDone=false;
        if(roll<0.35){ b.aiState='BOULDER'; b.stTimer=0.9; }
        else if(roll<0.68){ b.aiState='CLING'; b.stTimer=0.85; b.ceilingTargetX=Math.max(70,Math.min(levelData.worldW-b.w-70,phil.x-10)); }
        else { b.aiState='QUAKE'; b.stTimer=0.95; }
      }
      break;
    case 'BOULDER':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.55){
        const count=b.phase===2?3:2;
        for(let i=0;i<count;i++){
          const dx=(phil.x+phil.w/2+(i-(count-1)/2)*36)-(b.x+b.w/2), t=0.75, grav=520;
          b.rocks.push({x:b.x+b.w/2,y:b.y+20,vx:dx/t,vy:-260-i*40,grav,life:2.2,r:10});
        }
        SFX.stomp(); b.actionDone=true;
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; }
      break;
    case 'CLING':
      b.vx=0; b.y=Math.max(95,b.y-420*dt);
      if(b.stTimer<=0){ b.aiState='DROP'; b.vy=0; b.x=b.ceilingTargetX; b.actionDone=false; }
      break;
    case 'DROP':
      moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.wasOnGround===false&&b.onGround){
        shake=0.75; SFX.stomp();
        pushGroundWave(b.shockwaves,b.x-18,-230,84,1.3,'rgba(190,150,110,0.42)');
        pushGroundWave(b.shockwaves,b.x+b.w-18,230,84,1.3,'rgba(190,150,110,0.42)');
        b.actionDone=true; b.stTimer=0.35;
      }
      if(b.actionDone&&b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; }
      break;
    case 'QUAKE':
      b.vx*=Math.pow(0.05,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.5){
        shake=0.65; SFX.stomp();
        pushGroundWave(b.shockwaves,b.x-24,-260,96,1.45,'rgba(170,130,95,0.46)');
        pushGroundWave(b.shockwaves,b.x+b.w-24,260,96,1.45,'rgba(170,130,95,0.46)');
        if(b.phase===2) pushGroundWave(b.shockwaves,b.x+b.w/2-40,0,80,0.34,'rgba(220,180,140,0.54)');
        b.actionDone=true;
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.05; }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*4.6;
  b.x=Math.max(0,Math.min(b.x,levelData.worldW-b.w));
}

function updateRevenantTwin(t, dt){
  t.timer-=dt;
  if(t.state==='IDLE'){
    t.vx=t.facingR?95:-95;
    t.x+=t.vx*dt;
    if(t.x<=t.pL){ t.x=t.pL; t.facingR=true; }
    if(t.x+t.w>=t.pR){ t.x=t.pR-t.w; t.facingR=false; }
    if(t.timer<=0){
      t.actionDone=false;
      if(Math.random()<0.6){ t.state='THROW'; t.timer=0.95; }
      else { t.state='CHARGE'; t.timer=0.85; t.vx=((phil.x+phil.w/2)>(t.x+t.w/2)?1:-1)*220; t.facingR=t.vx>0; }
    }
  } else if(t.state==='THROW'){
    if(!t.actionDone&&t.timer<=0.5){
      if(t.variant==='bone'){
        const dir=t.facingR?1:-1;
        boss.bones.push({x:t.x+t.w/2,y:t.y+18,vx:dir*(boss.phase===2?250:220),vy:-10,life:2.0,w:30,h:10});
        boss.bones.push({x:t.x+t.w/2,y:t.y+32,vx:dir*(boss.phase===2?220:190),vy:30,life:2.0,w:30,h:10});
      } else {
        const dx=(phil.x+phil.w/2)-(t.x+t.w/2), grav=420, tt=0.85;
        boss.brains.push({x:t.x+t.w/2,y:t.y+20,vx:dx/tt,vy:-220,grav,life:2.5,r:12});
      }
      SFX.roar(); t.actionDone=true;
    }
    if(t.timer<=0){ t.state='IDLE'; t.timer=0.9; }
  } else if(t.state==='CHARGE'){
    t.x+=t.vx*dt;
    if(t.x<=t.pL||t.x+t.w>=t.pR||t.timer<=0){ t.state='IDLE'; t.timer=1.0; }
  }
  if(Math.abs(t.vx)>20) t.walkCycle+=dt*4.5;
}

function updateRevenant(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;
  updateGroundWaves(b.shockwaves,dt);
  for(let i=b.bones.length-1;i>=0;i--){
    const bone=b.bones[i];
    bone.x+=bone.vx*dt; bone.y+=bone.vy*dt; bone.life-=dt;
    if(shotHitsPhil(bone)||bone.life<=0||bone.x<-50||bone.x>levelData.worldW+50) b.bones.splice(i,1);
  }
  for(let i=b.brains.length-1;i>=0;i--){
    const brain=b.brains[i];
    brain.x+=brain.vx*dt; brain.y+=brain.vy*dt; brain.vy+=brain.grav*dt; brain.life-=dt;
    if(shotHitsPhil(brain)||shotHitsPlatforms(brain)||brain.y>GROUND_Y||brain.life<=0){
      burst(brain.x,Math.min(brain.y,GROUND_Y-10),'#88ff88',9,80,100);
      b.brains.splice(i,1);
    }
  }
  if(b.twins?.length){
    b.hidden=true;
    b.twins.forEach(t=>updateRevenantTwin(t,dt));
    return;
  }
  switch(b.aiState){
    case 'INTRO':
      b.vx=-70; moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.1; SFX.roar(); }
      break;
    case 'WALK':
      b.vx=b.facingR?(b.phase===2?150:110):-(b.phase===2?150:110);
      moveCollide(b,levelData.plats,dt);
      if(b.x<=0) b.facingR=true;
      if(b.x+b.w>=levelData.worldW) b.facingR=false;
      if(b.stTimer<=0){
        const roll=Math.random();
        b.actionDone=false;
        if(roll<0.34){ b.aiState='BONES'; b.stTimer=0.95; }
        else if(roll<0.68){ b.aiState='BRAINS'; b.stTimer=1.0; }
        else { b.aiState='STOMP'; b.stTimer=0.95; }
      }
      break;
    case 'BONES':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
      if(!b.actionDone&&b.stTimer<=0.55){
        const dir=b.facingR?1:-1;
        b.bones.push({x:b.x+b.w/2,y:b.y+20,vx:dir*230,vy:-20,life:2.0,w:32,h:10});
        b.bones.push({x:b.x+b.w/2,y:b.y+40,vx:dir*200,vy:35,life:2.0,w:28,h:10});
        if(b.phase===2) b.bones.push({x:b.x+b.w/2,y:b.y+30,vx:dir*260,vy:5,life:1.8,w:30,h:10});
        b.actionDone=true; SFX.laser();
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; }
      break;
    case 'BRAINS':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.58){
        const count=b.phase===2?3:2;
        for(let i=0;i<count;i++){
          const dx=(phil.x+phil.w/2+(i-(count-1)/2)*28)-(b.x+b.w/2);
          b.brains.push({x:b.x+b.w/2,y:b.y+18,vx:dx/0.85,vy:-240-i*30,grav:430,life:2.5,r:12});
        }
        b.actionDone=true; SFX.roar();
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; }
      break;
    case 'STOMP':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.5){
        shake=0.65; SFX.stomp();
        pushGroundWave(b.shockwaves,b.x-26,-230,92,1.35,'rgba(200,200,200,0.42)');
        pushGroundWave(b.shockwaves,b.x+b.w-26,230,92,1.35,'rgba(120,255,120,0.38)');
        b.actionDone=true;
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.05; }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*4.2;
}

function updateCaptainFlash(flash, dt){
  if(!flash.exploded){
    flash.x+=flash.vx*dt; flash.y+=flash.vy*dt; flash.vy+=flash.grav*dt; flash.life-=dt;
    if(flash.life<=0||shotHitsPlatforms({x:flash.x,y:flash.y,w:12,h:12})){
      flash.exploded=true; flash.life=0.35; flash.r=flash.r||68; burst(flash.x,Math.min(flash.y,GROUND_Y-10),'#ffeeaa',10,70,0); SFX.bomb();
    }
  } else {
    flash.life-=dt;
    if(!flash.hit&&phil.invTimer<=0&&Math.hypot((phil.x+phil.w/2)-flash.x,(phil.y+phil.h/2)-flash.y)<flash.r){ philTakeDmg(0.5); flash.hit=true; }
  }
}

function updateCaptain(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;
  updateGroundWaves(b.shockwaves,dt);
  for(let i=b.flashes.length-1;i>=0;i--){
    const f=b.flashes[i];
    updateCaptainFlash(f,dt);
    if(f.life<=0) b.flashes.splice(i,1);
  }
  switch(b.aiState){
    case 'INTRO':
      b.vx=-90; moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; SFX.roar(); }
      break;
    case 'WALK':
      b.vx=b.facingR?(b.phase===2?185:140):-(b.phase===2?185:140);
      moveCollide(b,levelData.plats,dt);
      if(b.x<=0) b.facingR=true;
      if(b.x+b.w>=levelData.worldW) b.facingR=false;
      if(b.stTimer<=0){
        const roll=Math.random();
        b.actionDone=false;
        if(roll<0.34){ b.aiState='DASH'; b.stTimer=b.phase===2?1.0:1.25; b.chargeDir=(phil.x+phil.w/2)>(b.x+b.w/2)?1:-1; b.facingR=b.chargeDir>0; }
        else if(roll<0.67){ b.aiState='FLASH'; b.stTimer=0.95; }
        else { b.aiState='SHOCK'; b.stTimer=0.9; }
      }
      break;
    case 'DASH':
      b.vx=b.chargeDir*(b.phase===2?390:320); moveCollide(b,levelData.plats,dt);
      if(b.x<=0||b.x+b.w>=levelData.worldW||b.stTimer<=0){ b.aiState='WALK'; b.stTimer=0.95; }
      break;
    case 'FLASH':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.56){
        const count=b.phase===2?2:1;
        for(let i=0;i<count;i++){
          const dir=(phil.x+phil.w/2)>(b.x+b.w/2)?1:-1;
          b.flashes.push({x:b.x+b.w/2,y:b.y+22,vx:dir*(170+i*70),vy:-260-i*45,grav:500,life:1.0,r:74,exploded:false,hit:false});
        }
        b.actionDone=true; SFX.bomb();
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=1.0; }
      break;
    case 'SHOCK':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.48){
        shake=0.55; SFX.stomp();
        pushGroundWave(b.shockwaves,b.x-20,-220,88,1.2,'rgba(120,180,255,0.45)');
        pushGroundWave(b.shockwaves,b.x+b.w-20,220,88,1.2,'rgba(120,180,255,0.45)');
        if(b.phase===2) pushGroundWave(b.shockwaves,b.x+b.w/2-36,0,72,0.28,'rgba(200,220,255,0.58)');
        b.actionDone=true;
      }
      if(b.stTimer<=0){ b.aiState='WALK'; b.stTimer=0.95; }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*5.2;
}

function updateAgent(dt){
  const b=boss;
  if(b.invTimer>0)b.invTimer-=dt;
  b.stTimer-=dt;
  updateGroundWaves(b.shockwaves,dt);
  for(let i=b.tasers.length-1;i>=0;i--){
    const t=b.tasers[i];
    t.x+=t.vx*dt; t.y+=t.vy*dt; t.life-=dt;
    if(shotHitsPhil(t)||shotHitsPlatforms(t)||t.life<=0) b.tasers.splice(i,1);
  }
  for(let i=b.flashes.length-1;i>=0;i--){
    const f=b.flashes[i];
    updateCaptainFlash(f,dt);
    if(f.life<=0) b.flashes.splice(i,1);
  }
  for(let i=b.heliShots.length-1;i>=0;i--){
    const s=b.heliShots[i];
    s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=dt;
    if(shotHitsPhil(s)||shotHitsPlatforms(s)||s.life<=0||s.y>GROUND_Y+40) b.heliShots.splice(i,1);
  }
  if(b.heli){
    b.heli.x+=b.heli.vx*dt; b.heli.fireTimer-=dt;
    if(b.heli.fireTimer<=0){
      b.heli.fireTimer=b.phase===2?0.18:0.28;
      b.heliShots.push({x:b.heli.x,y:b.heli.y+20,vx:b.heli.vx*0.25,vy:b.phase===2?290:240,life:2.0,w:10,h:22});
    }
    if((b.heli.vx>0&&b.heli.x>levelData.worldW+140)||(b.heli.vx<0&&b.heli.x<-140)) b.heli=null;
  }
  switch(b.aiState){
    case 'INTRO':
      b.vx=-80; moveCollide(b,levelData.plats,dt);
      if(b.stTimer<=0){ b.aiState='MOVE'; b.stTimer=1.0; SFX.roar(); }
      break;
    case 'MOVE':
      b.vx=b.facingR?(b.phase===2?175:135):-(b.phase===2?175:135);
      moveCollide(b,levelData.plats,dt);
      if(b.x<=0) b.facingR=true;
      if(b.x+b.w>=levelData.worldW) b.facingR=false;
      if(b.stTimer<=0){
        const roll=Math.random();
        b.actionDone=false;
        if(roll<0.34){ b.aiState='TASER'; b.stTimer=0.95; }
        else if(roll<0.67){ b.aiState='FLASH'; b.stTimer=1.0; }
        else { b.aiState='HELI'; b.stTimer=b.phase===2?2.1:1.7; }
      }
      break;
    case 'TASER':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      b.facingR=(phil.x+phil.w/2)>(b.x+b.w/2);
      if(!b.actionDone&&b.stTimer<=0.56){
        const count=b.phase===2?3:2;
        for(let i=0;i<count;i++){
          const dx=(phil.x+phil.w/2)-(b.x+b.w/2), dy=(phil.y+phil.h/2)-(b.y+18);
          const len=Math.hypot(dx,dy)||1, spread=(i-(count-1)/2)*0.12, cos=Math.cos(spread), sin=Math.sin(spread);
          const vx=(dx/len*320)*cos-(dy/len*320)*sin, vy=(dx/len*320)*sin+(dy/len*320)*cos;
          b.tasers.push({x:b.x+b.w/2,y:b.y+18,vx,vy,life:1.8,w:26,h:8});
        }
        b.actionDone=true; SFX.laser();
      }
      if(b.stTimer<=0){ b.aiState='MOVE'; b.stTimer=0.95; }
      break;
    case 'FLASH':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone&&b.stTimer<=0.58){
        b.flashes.push({x:b.x+b.w/2,y:b.y+20,vx:b.facingR?190:-190,vy:-280,grav:500,life:1.05,r:80,exploded:false,hit:false});
        if(b.phase===2) b.flashes.push({x:b.x+b.w/2,y:b.y+20,vx:b.facingR?280:-280,vy:-240,grav:500,life:1.0,r:70,exploded:false,hit:false});
        b.actionDone=true; SFX.bomb();
      }
      if(b.stTimer<=0){ b.aiState='MOVE'; b.stTimer=0.95; }
      break;
    case 'HELI':
      b.vx*=Math.pow(0.04,dt); moveCollide(b,levelData.plats,dt);
      if(!b.actionDone){
        const fromLeft=Math.random()<0.5;
        b.heli={x:fromLeft?-120:levelData.worldW+120,y:105,vx:fromLeft?(b.phase===2?340:280):-(b.phase===2?340:280),fireTimer:0.15};
        b.actionDone=true; SFX.roar();
      }
      if(b.stTimer<=0&& !b.heli){ b.aiState='MOVE'; b.stTimer=0.95; }
      break;
  }
  if(Math.abs(b.vx)>20) b.walkCycle+=dt*5;
}

function updateBoss(dt){
  if(!boss||boss.dead) return;
  switch(boss.type){
    case 'giant':    updateGiant(dt); break;
    case 'anaconda': updateAnaconda(dt); break;
    case 'lizard':   updateLizard(dt); break;
    case 'frostwarden': updateFrostWarden(dt); break;
    case 'yeti':     updateYeti(dt); break;
    case 'foreman':  updateForeman(dt); break;
    case 'mole':     updateMole(dt); break;
    case 'tunnelfiend': updateTunnelFiend(dt); break;
    case 'revenant': updateRevenant(dt); break;
    case 'captain':  updateCaptain(dt); break;
    case 'agent':    updateAgent(dt); break;
    case 'mech':     updateMech(dt); break;
  }
}

function updateCam(dt){
  let tx=phil.x+phil.w/2-W/2;
  if(boss){
    const focus=getBossFocusBox()||boss;
    tx=(phil.x+focus.x+focus.w/2)/2-W/2;
  }
  cam.x+=(tx-cam.x)*Math.min(1,7*dt);
  cam.x=Math.max(0,Math.min(cam.x,levelData.worldW-W));
}

const STAR_POS = Array.from({length:120},(_,i)=>({x:Math.sin(i*7.3)*.5+.5,y:Math.sin(i*13.7)*.5+.5,r:.5+(i%3)*.5}));
const TREE_POS_FAR  = Array.from({length:25},(_,i)=>({x:i*200+80,scale:.5+Math.sin(i*3.7)*.2}));
const TREE_POS_NEAR = Array.from({length:20},(_,i)=>({x:i*250+130,scale:.7+Math.sin(i*2.9)*.25}));

function drawPineTree(x,y,scale,col){
  ctx.fillStyle=col;
  // Trunk
  ctx.fillRect(x-3*scale,y,6*scale,18*scale);
  // Canopy layers
  [[0,-8,22],[0,-22,18],[0,-34,14]].forEach(([ox,oy,r])=>{
    ctx.beginPath(); ctx.moveTo(x+ox*scale,y+oy*scale);
    ctx.lineTo(x+(ox-r)*scale,y+(oy+r)*scale);
    ctx.lineTo(x+(ox+r)*scale,y+(oy+r)*scale);
    ctx.closePath(); ctx.fill();
  });
}
function drawDune(x,y,w,h,col){
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(x,y+h);
  ctx.quadraticCurveTo(x+w/2,y-h,x+w,y+h); ctx.closePath(); ctx.fill();
}
function drawCactus(x,y,scale,col){
  ctx.fillStyle=col;
  // Main trunk
  ctx.fillRect(x-5*scale,y-45*scale,10*scale,45*scale);
  // Left arm
  ctx.fillRect(x-20*scale,y-28*scale,15*scale,8*scale);
  ctx.fillRect(x-25*scale,y-40*scale,8*scale,14*scale);
  // Right arm
  ctx.fillRect(x+5*scale,y-22*scale,15*scale,8*scale);
  ctx.fillRect(x+17*scale,y-35*scale,8*scale,15*scale);
}

function drawSnowPine(x,y,scale,col){
  drawPineTree(x,y,scale,col);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[0,-10,22],[0,-24,18],[0,-36,14]].forEach(([ox,oy,r])=>{
    ctx.beginPath();
    ctx.moveTo(x+ox*scale,y+(oy+3)*scale);
    ctx.lineTo(x+(ox-r*0.8)*scale,y+(oy+r*0.55)*scale);
    ctx.lineTo(x+(ox+r*0.8)*scale,y+(oy+r*0.55)*scale);
    ctx.closePath();
    ctx.fill();
  });
}

function drawIceCrystal(x,y,scale,col){
  ctx.save();
  ctx.translate(x,y-24*scale);
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,-26*scale);
  ctx.lineTo(10*scale,-6*scale);
  ctx.lineTo(6*scale,26*scale);
  ctx.lineTo(-6*scale,26*scale);
  ctx.lineTo(-10*scale,-6*scale);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(-2*scale,-18*scale,3*scale,34*scale);
  ctx.restore();
}

function drawPipe(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.fillRect(x-12*scale,y-42*scale,24*scale,42*scale);
  ctx.fillStyle='#7f8790';
  ctx.fillRect(x-15*scale,y-46*scale,30*scale,8*scale);
  ctx.fillRect(x-15*scale,y-8*scale,30*scale,8*scale);
}

function drawGearPole(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.fillRect(x-4*scale,y-48*scale,8*scale,48*scale);
  ctx.strokeStyle='#adb5bf';
  ctx.lineWidth=3*scale;
  ctx.beginPath(); ctx.arc(x,y-28*scale,12*scale,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y-28*scale,5*scale,0,Math.PI*2); ctx.stroke();
}

function drawStalagmite(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(x,y-44*scale);
  ctx.lineTo(x+16*scale,y);
  ctx.lineTo(x-16*scale,y);
  ctx.closePath();
  ctx.fill();
}

function drawLantern(x,y,scale,col){
  ctx.fillStyle='#4a3625';
  ctx.fillRect(x-2*scale,y-50*scale,4*scale,18*scale);
  ctx.fillStyle=col;
  ctx.fillRect(x-10*scale,y-34*scale,20*scale,20*scale);
  ctx.fillStyle='rgba(255,220,120,0.7)';
  ctx.fillRect(x-6*scale,y-30*scale,12*scale,12*scale);
}

function drawStreetlight(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.fillRect(x-3*scale,y-55*scale,6*scale,55*scale);
  ctx.fillRect(x-3*scale,y-55*scale,18*scale,6*scale);
  ctx.fillStyle='rgba(255,238,180,0.8)';
  ctx.fillRect(x+12*scale,y-47*scale,10*scale,8*scale);
}

function drawBollard(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.fillRect(x-5*scale,y-20*scale,10*scale,20*scale);
  ctx.fillStyle='#ff4444';
  ctx.fillRect(x-5*scale,y-16*scale,10*scale,4*scale);
}

function drawAntenna(x,y,scale,col){
  ctx.fillStyle=col;
  ctx.fillRect(x-2*scale,y-52*scale,4*scale,52*scale);
  ctx.fillStyle='#dde5ef';
  ctx.fillRect(x-8*scale,y-44*scale,16*scale,3*scale);
  ctx.fillRect(x-6*scale,y-30*scale,12*scale,3*scale);
  ctx.fillRect(x-4*scale,y-18*scale,8*scale,3*scale);
}

function drawBackground(){
  const w=WORLDS[G.world];
  // Sky gradient
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,w.skyT); gr.addColorStop(1,w.skyB);
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);

  if(w.bgName==='forest'){
    // Stars
    ctx.fillStyle='rgba(255,255,255,0.5)';
    STAR_POS.forEach(s=>{ const sx=((s.x*5000-cam.x*0.05)%W+W)%W; ctx.beginPath(); ctx.arc(sx,s.y*H*.5,s.r,0,Math.PI*2); ctx.fill(); });
    // Far trees
    TREE_POS_FAR.forEach(t=>{ const tx=((t.x-cam.x*.1)%(TREE_POS_FAR.length*200)+TREE_POS_FAR.length*200)%W-60; drawPineTree(tx,GROUND_Y-cam.y-20,t.scale,'#1a4a0a'); });
    // Near trees
    TREE_POS_NEAR.forEach(t=>{ const tx=((t.x-cam.x*.3)%(TREE_POS_NEAR.length*250)+TREE_POS_NEAR.length*250)%W-60; drawPineTree(tx,GROUND_Y-cam.y-10,t.scale,'#2a6a14'); });
  } else if(w.bgName==='desert'){
    // Dunes far
    for(let i=0;i<8;i++){ const dx=((i*300-cam.x*.1)%(8*300)+8*300)%W-60; drawDune(dx,H-80,260,60,'#a07030'); }
    for(let i=0;i<6;i++){ const dx=((i*380-cam.x*.25)%(6*380)+6*380)%W-80; drawDune(dx,H-60,300,50,'#b88040'); }
  } else if(w.bgName==='snow'){
    ctx.fillStyle='rgba(255,255,255,0.65)';
    STAR_POS.forEach(s=>{ const sx=((s.x*5200-cam.x*0.08)%W+W)%W; ctx.fillRect(sx,s.y*H*.62,1+s.r,1+s.r); });
    for(let i=0;i<6;i++){
      const mx=((i*260-cam.x*.08)%(6*260)+6*260)%W-120;
      ctx.fillStyle=i%2?'#99afd0':'#7a90b4';
      ctx.beginPath(); ctx.moveTo(mx,H-120); ctx.lineTo(mx+120,H-310); ctx.lineTo(mx+240,H-120); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.moveTo(mx+80,H-185); ctx.lineTo(mx+120,H-310); ctx.lineTo(mx+160,H-185); ctx.closePath(); ctx.fill();
    }
    for(let i=0;i<4;i++){
      const dx=((i*320-cam.x*.18)%(4*320)+4*320)%W-80;
      drawDune(dx,H-45,300,26,'rgba(240,248,255,0.95)');
    }
  } else if(w.bgName==='factory'){
    ctx.fillStyle='rgba(30,24,38,0.9)';
    for(let i=0;i<7;i++){
      const bx=((i*180-cam.x*.08)%(7*180)+7*180)%W-40;
      ctx.fillRect(bx,H-180,90,140);
      ctx.fillStyle='rgba(120,150,160,0.18)';
      for(let r=0;r<4;r++) for(let c=0;c<3;c++) ctx.fillRect(bx+12+c*22,H-165+r*24,10,12);
      ctx.fillStyle='rgba(30,24,38,0.9)';
    }
    for(let i=0;i<4;i++){
      const sx=((i*260-cam.x*.18)%(4*260)+4*260)%W-40;
      ctx.fillStyle='#444b58'; ctx.fillRect(sx,H-230,28,190);
      ctx.fillStyle='rgba(160,160,160,0.22)';
      ctx.beginPath(); ctx.arc(sx+14,H-240-((frameN+i*20)%30),16,0,Math.PI*2); ctx.fill();
    }
  } else if(w.bgName==='mines'){
    ctx.fillStyle='rgba(0,0,0,0.28)';
    for(let i=0;i<6;i++){
      const ox=((i*220-cam.x*.08)%(6*220)+6*220)%W-80;
      ctx.beginPath(); ctx.moveTo(ox,H); ctx.lineTo(ox+70,H-220); ctx.lineTo(ox+150,H); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(ox+60,0); ctx.lineTo(ox+130,170); ctx.lineTo(ox+200,0); ctx.closePath(); ctx.fill();
    }
    for(let i=0;i<10;i++){
      const cx=((i*120-cam.x*.15)%(10*120)+10*120)%W-20;
      ctx.fillStyle=i%2?'rgba(120,255,220,0.18)':'rgba(180,120,255,0.12)';
      ctx.beginPath(); ctx.moveTo(cx,H-80); ctx.lineTo(cx+10,H-120); ctx.lineTo(cx+18,H-82); ctx.closePath(); ctx.fill();
    }
  } else if(w.bgName==='berlin'){
    ctx.fillStyle='rgba(18,22,32,0.9)';
    for(let i=0;i<9;i++){
      const bx=((i*140-cam.x*.12)%(9*140)+9*140)%W-30;
      const bh=70+(i%4)*38;
      ctx.fillRect(bx,H-80-bh,95,bh);
      ctx.fillStyle='rgba(255,220,140,0.18)';
      for(let r=0;r<4;r++) for(let c=0;c<3;c++) ctx.fillRect(bx+12+c*24,H-68-bh+r*18,12,10);
      ctx.fillStyle='rgba(18,22,32,0.9)';
    }
    const towerX=((520-cam.x*.2)%W+W)%W;
    ctx.fillStyle='#b7c4d4';
    ctx.fillRect(towerX,H-250,4,170);
    ctx.beginPath(); ctx.arc(towerX+2,H-260,18,0,Math.PI*2); ctx.fill();
    ctx.fillRect(towerX-18,H-300,40,6);
  }
}

function drawPlatforms(){
  const w=WORLDS[G.world];
  for(const p of levelData.plats){
    const px=p.x-cam.x, py=p.y-cam.y;
    if(px+p.w<0||px>W) continue;
    ctx.fillStyle=w.platFill; ctx.fillRect(px,py,p.w,p.h);
    ctx.fillStyle=w.platTop; ctx.fillRect(px,py,p.w,4);
    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(px,py+p.h-3,p.w,3);
    // Decorative dots/grass on forest platforms
    if(G.world===1&&p.y<GROUND_Y){
      ctx.fillStyle='#5ab025';
      for(let i=0;i<Math.floor(p.w/20);i++) ctx.fillRect(px+5+i*20,py-3,3,3);
    } else if(G.world===3){
      ctx.fillStyle='rgba(255,255,255,0.95)';
      for(let i=0;i<Math.floor(p.w/24);i++) ctx.fillRect(px+6+i*24,py-4,10,4);
    } else if(G.world===4){
      ctx.fillStyle='rgba(255,180,80,0.35)';
      for(let i=0;i<Math.floor(p.w/34);i++) ctx.fillRect(px+8+i*34,py+4,6,6);
    } else if(G.world===5){
      ctx.fillStyle='rgba(120,255,220,0.3)';
      for(let i=0;i<Math.floor(p.w/42);i++) ctx.fillRect(px+12+i*42,py+4,4,8);
    } else if(G.world===6){
      ctx.fillStyle='rgba(255,255,255,0.25)';
      for(let i=0;i<Math.floor(p.w/50);i++) ctx.fillRect(px+10+i*50,py+5,18,2);
    }
  }
}

function drawDecorations(){
  if(!levelData.decorations) return;
  const w=WORLDS[G.world];
  for(const d of levelData.decorations){
    const parallax=d.layer===0?0.1:0.25;
    const dx=d.x-cam.x*parallax;
    if(dx<-100||dx>W+100) continue;
    if(d.type==='tree') drawPineTree(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#1a4a0a':'#2a6a14');
    else if(d.type==='cactus') drawCactus(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#2a6a2a':'#3a8a3a');
    else if(d.type==='snowPine') drawSnowPine(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#46648a':'#5f7faa');
    else if(d.type==='iceCrystal') drawIceCrystal(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'rgba(170,220,255,0.55)':'rgba(220,245,255,0.78)');
    else if(d.type==='pipe') drawPipe(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#4c5663':'#707b88');
    else if(d.type==='gearPole') drawGearPole(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#4d5661':'#8c97a2');
    else if(d.type==='stalagmite') drawStalagmite(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#56443c':'#7a6658');
    else if(d.type==='crystal') drawIceCrystal(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'rgba(120,255,220,0.35)':'rgba(180,255,240,0.7)');
    else if(d.type==='lantern') drawLantern(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'rgba(255,215,130,0.45)':'rgba(255,226,150,0.75)');
    else if(d.type==='streetlight') drawStreetlight(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#57616d':'#8e99a6');
    else if(d.type==='bollard') drawBollard(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#727981':'#c0c6ce');
    else if(d.type==='antenna') drawAntenna(dx,GROUND_Y-cam.y,d.scale,d.layer===0?'#5a6570':'#b2bcc8');
  }
}

function heartPath(cx,cy){
  ctx.beginPath();
  ctx.arc(cx-4,cy,5,Math.PI*.8,Math.PI*.2,true);
  ctx.arc(cx+4,cy,5,Math.PI*.8,Math.PI*.2,true);
  ctx.lineTo(cx,cy+9); ctx.closePath();
}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,48);
  // Hearts
  ctx.font='bold 13px monospace'; ctx.fillStyle='#cc4444'; ctx.textAlign='left'; ctx.fillText('HP:',10,20);
  for(let i=0;i<5;i++){
    const val=phil.health-i;
    const hx=48+i*30, hy=16;
    if(val>=1){ ctx.fillStyle='#ff3333'; heartPath(hx,hy); ctx.fill(); }
    else if(val>=.5){
      ctx.fillStyle='#441111'; heartPath(hx,hy); ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.rect(hx-14,hy-14,14,28); ctx.clip();
      ctx.fillStyle='#ff3333'; heartPath(hx,hy); ctx.fill(); ctx.restore();
    } else { ctx.fillStyle='#441111'; heartPath(hx,hy); ctx.fill(); }
    ctx.strokeStyle='#880000'; ctx.lineWidth=1.5; heartPath(hx,hy); ctx.stroke();
  }
  // Score
  ctx.fillStyle='#ffd700'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
  ctx.fillText('SCORE: '+G.score,200,20);
  // Lives
  ctx.fillStyle='#88aaff'; ctx.font='bold 13px monospace';
  ctx.fillText('LIVES: '+G.lives,360,20);
  // Level indicator
  ctx.textAlign='center'; ctx.fillStyle='#ccaaff'; ctx.font='12px monospace';
  const isBoss=(G.level===5||G.level===10);
  ctx.fillText((G.screen==='FINAL_BOSS_INTRO'||boss?.type==='mech')?'★ FINAL BOSS ★':`WORLD ${G.world} - ${WORLDS[G.world].name} - LEVEL ${G.level}${isBoss?' ⚠ BOSS':''} `,W/2,38);
  // Controls hint
  const controlsHint='A/D: Move   W/Space: Jump   Z: Sword   X: Shield   Esc: Pause';
  ctx.font='bold 10px monospace';
  const hintW=ctx.measureText(controlsHint).width;
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(W/2-hintW/2-8,H-19,hintW+16,15);
  ctx.fillStyle='rgba(245,245,255,0.92)';
  ctx.fillText(controlsHint,W/2,H-8);
  ctx.textAlign='left';

  // Boss health bar
  if(boss&&!boss.dead){
    const bw=300, bh=14, bx=(W-bw)/2, by=54;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle='#330000'; ctx.fillRect(bx,by,bw,bh);
    const pct=Math.max(0,boss.health/boss.maxHealth);
    const bcol=pct>.5?'#ee2222':pct>.25?'#ee8800':'#ffdd00';
    ctx.fillStyle=bcol; ctx.fillRect(bx,by,bw*pct,bh);
    ctx.fillStyle='#fff'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText(getBossMeta(boss.type).name,W/2,by+10); ctx.textAlign='left';
  }

  // Combo indicator
  if(combo>=2){
    const cx2=W/2, cy2=H-30;
    const frac=Math.min(1,comboTimer/COMBO_WINDOW);
    const col=combo>=5?'#ff88ff':combo>=3?'#ffaa00':'#ffdd44';
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(cx2-60,cy2-18,120,8);
    ctx.fillStyle=col; ctx.fillRect(cx2-60,cy2-18,120*frac,8);
    ctx.fillStyle=col; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillText('COMBO ×'+combo,cx2,cy2-22); ctx.shadowBlur=0;
    ctx.textAlign='left';
  }

  // Checkpoint indicator
  if(levelData.checkX&&!levelData.isBoss){
    ctx.fillStyle=checkActivated?'rgba(70,150,255,0.8)':'rgba(100,100,150,0.5)';
    ctx.font='11px monospace'; ctx.textAlign='right';
    ctx.fillText(checkActivated?'CHECKPOINT ✓':'CHECKPOINT',W-10,20);
    ctx.textAlign='left';
  }
}

// ─── FLAG DRAWING ───
function drawFlag(x, y, color, waving){
  const fx=x-cam.x, fy=y-cam.y;
  // Pole
  ctx.strokeStyle='#888'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(fx,fy+80); ctx.lineTo(fx,fy); ctx.stroke();
  // Flag cloth (waving)
  const t=waving?Math.sin(frameN*.08)*8:0;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(fx,fy);
  ctx.lineTo(fx+35,fy+t+8);
  ctx.lineTo(fx+30,fy+t+18);
  ctx.lineTo(fx,fy+20);
  ctx.closePath(); ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.moveTo(fx+2,fy+2); ctx.lineTo(fx+20,fy+t+8); ctx.lineTo(fx+2,fy+18); ctx.closePath(); ctx.fill();
}

// ─── STICKMAN DRAW ───
function drawStickman(x,y,w,h,opts){
  const {facingR,walkCycle,attacking,atkTimer,atkDur,shielding,
         color,swordColor,shieldColor,invTimer,dead,isPlayer,scale,isArcher,health,maxHealth,type} = opts;
  const sc=scale||1;
  const cx=x+w/2, by=y+h;
  const dir=facingR?1:-1;
  const headR=7*sc, bodyH=20*sc, legH=17*sc, armL=12*sc, lw=Math.max(1.5,2*sc);
  const atkProg=attacking?(1-atkTimer/atkDur):0;

  ctx.save();
  ctx.translate(cx-cam.x, by-cam.y);
  if(invTimer>0&&isPlayer) ctx.globalAlpha=Math.sin(invTimer*22)>.0?1:0.3;
  if(dead) ctx.globalAlpha=0.5;
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';

  // Head
  ctx.beginPath(); ctx.arc(0,-bodyH-headR,headR,0,Math.PI*2); ctx.stroke();

  if(type==='glider'){
    const flap=Math.sin(walkCycle*1.8)*5*sc;
    ctx.strokeStyle='rgba(215,235,255,0.85)'; ctx.lineWidth=Math.max(1.5,2*sc);
    ctx.beginPath();
    ctx.moveTo(0,-bodyH+6); ctx.lineTo(-18*sc,-bodyH-2-flap); ctx.lineTo(-28*sc,-bodyH+8);
    ctx.moveTo(0,-bodyH+6); ctx.lineTo(18*sc,-bodyH-2+flap); ctx.lineTo(28*sc,-bodyH+8);
    ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=lw;
  }

  if(isPlayer){
    // Eyes
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(dir*2.5,-bodyH-headR,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(dir*2.5+dir,-bodyH-headR,1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=color;
  } else {
    // Enemy angry X eyes
    ctx.lineWidth=1.5;
    [-3,2].forEach(ox=>{ const ey=-bodyH-headR; ctx.beginPath(); ctx.moveTo(ox-1.5,ey-2); ctx.lineTo(ox+1.5,ey+1); ctx.moveTo(ox+1.5,ey-2); ctx.lineTo(ox-1.5,ey+1); ctx.stroke(); });
    ctx.lineWidth=lw;
    // Archer hat
    if(isArcher){ ctx.fillStyle='#556b2f'; ctx.fillRect(-headR,-bodyH-headR*2-4,headR*2,5); ctx.fillStyle='#556b2f'; ctx.fillRect(-headR+3,-bodyH-headR*2-10,headR*2-6,8); ctx.fillStyle=color; }
  }

  // Body
  ctx.beginPath(); ctx.moveTo(0,-bodyH); ctx.lineTo(0,0); ctx.stroke();

  // Legs walk
  const legSw=Math.sin(walkCycle)*18*sc;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*(legSw*.3-4*sc),legH*.55); ctx.lineTo(dir*(-2*sc+legSw*.2),legH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*(-legSw*.3+4*sc),legH*.55); ctx.lineTo(dir*(2*sc-legSw*.2),legH); ctx.stroke();

  // Arms
  const armSw=Math.sin(walkCycle+Math.PI)*10*sc;
  if(shielding){
    // Shield arm (front arm raised holding shield)
    const shX=dir*(armL+6); const shY=-bodyH+4;
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(shX,shY); ctx.stroke();
    // Shield rect
    ctx.fillStyle=shieldColor||'#4466cc'; ctx.strokeStyle=shieldColor?'#4a3314':'#2244aa'; ctx.lineWidth=2;
    const shieldX=shX+dir*4-6, shieldY=shY-12;
    ctx.fillRect(shieldX,shieldY,14,22);
    ctx.strokeRect(shieldX,shieldY,14,22);
    // Shield cross
    ctx.strokeStyle='#99aaff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(shieldX+7,shieldY+2); ctx.lineTo(shieldX+7,shieldY+20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shieldX+2,shieldY+11); ctx.lineTo(shieldX+12,shieldY+11); ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    // Back arm
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(-dir*(armL-3),-bodyH+12+armSw*.3); ctx.stroke();
    // Sword at side
    ctx.strokeStyle=swordColor||'#c8eeff'; ctx.lineWidth=2;
    const sx=-dir*(armL-3), sy=-bodyH+12+armSw*.3;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-dir*18,sy-8); ctx.stroke();
  } else if(attacking){
    const thX=dir*(armL+8+atkProg*8), thY=-bodyH+6-atkProg*4;
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(thX,thY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(-dir*(armL-4),-bodyH+12); ctx.stroke();
    // Sword thrust
    ctx.strokeStyle=swordColor||'#c8eeff'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(thX,thY); ctx.lineTo(thX+dir*26,thY-8); ctx.stroke();
    ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(thX-dir*2,thY+4); ctx.lineTo(thX+dir*4,thY-4); ctx.stroke();
    // Glow during attack
    if(atkProg>0.5){ ctx.strokeStyle='rgba(180,220,255,0.4)'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(thX,thY); ctx.lineTo(thX+dir*26,thY-8); ctx.stroke(); }
  } else {
    // Idle / walk
    const a1x=dir*(armL+armSw*.3), a1y=-bodyH+10+Math.abs(armSw)*.2;
    const a2x=-dir*(armL-armSw*.3), a2y=-bodyH+10-Math.abs(armSw)*.2;
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(a1x,a1y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-bodyH+5); ctx.lineTo(a2x,a2y); ctx.stroke();
    // Sword at rest
    if(isPlayer){ ctx.strokeStyle=swordColor||'#c8eeff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(a1x,a1y); ctx.lineTo(a1x+dir*20,a1y-9); ctx.stroke(); }
    // Archer bow
    if(isArcher){ ctx.strokeStyle='#8B4513'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(a2x-dir*2,a2y-5,10,dir<0?-Math.PI*.6:-Math.PI*.4,dir<0?Math.PI*.6:Math.PI*.4,dir>0); ctx.stroke(); ctx.strokeStyle='rgba(200,200,200,0.7)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a2x-dir*2,a2y-14); ctx.lineTo(a2x-dir*2,a2y+4); ctx.stroke(); }
    if(type==='bomber'){
      ctx.fillStyle='#222';
      ctx.beginPath(); ctx.arc(a2x-dir*2,a2y-3,4.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ffcc66'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(a2x+dir*1,a2y-7); ctx.lineTo(a2x+dir*4,a2y-12); ctx.stroke();
      ctx.strokeStyle=color; ctx.lineWidth=lw;
    }
    // Soldier spear
    if(!isArcher&&!isPlayer&&type!=='bomber'&&type!=='glider'){ ctx.strokeStyle='#8B6914'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(a1x,a1y); ctx.lineTo(a1x+dir*26,a1y-12); ctx.stroke(); ctx.fillStyle='#bbaa22'; ctx.beginPath(); ctx.moveTo(a1x+dir*26,a1y-12); ctx.lineTo(a1x+dir*32,a1y-20); ctx.lineTo(a1x+dir*20,a1y-14); ctx.fill(); }
  }

  // Giant boss: add club
  if(type==='giant_boss'){
    ctx.strokeStyle='#5a3a10'; ctx.lineWidth=8;
    const a1x=dir*(armL+armSw*.3), a1y=-bodyH+10+Math.abs(armSw)*.2;
    ctx.beginPath(); ctx.moveTo(a1x,a1y); ctx.lineTo(a1x+dir*35,a1y-10); ctx.stroke();
    ctx.fillStyle='#4a2a00'; ctx.beginPath(); ctx.arc(a1x+dir*38,a1y-12,14,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#6a4a20'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(a1x+dir*38,a1y-12,14,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();

  // Enemy health pips
  if(!isPlayer&&!dead&&maxHealth>0){
    const bx=x-cam.x, by2=y-cam.y-6;
    for(let i=0;i<maxHealth;i++){
      ctx.fillStyle=i<health?'#44ff44':'#223322';
      ctx.fillRect(bx+i*6,by2,5,3);
    }
  }
}
